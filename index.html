<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/public/font.css">
    <title>Homepage Brave</title>

    <!-- coloration -->
    <script>
      // Auto-clear old theme settings when theme version changes
      const THEME_VERSION = 'miku-v4'
      if (localStorage.getItem('themeVersion') !== THEME_VERSION) {
        localStorage.removeItem('settings')
        localStorage.setItem('themeVersion', THEME_VERSION)
      }

      const settings = JSON.parse(localStorage.getItem('settings'))
      if (settings) {
        const colorScheme = settings.appearance.colorScheme === 'auto'
          ? window.matchMedia("(prefers-color-scheme: dark)").matches
            ? 'dark'
            : 'light'
          : settings.appearance.colorScheme
  
        document.documentElement.style.backgroundColor = '#fe008a'
      }
    </script>
    <!-- -->

  </head>
  <body>
    <div id="root"></div>
    <script src="config.js"></script>
    <script src="icons.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
